name: DAST Security Scan

on:
  schedule:
    # Weekly scan on Monday at 2 AM UTC
    - cron: "0 2 * * 1"
  workflow_dispatch:
    inputs:
      target_url:
        description: "Target URL to scan (default: UAT)"
        required: false
        type: string

env:
  DEFAULT_TARGET_URL: "https://app-cadence-api-uat.azurewebsites.net"

jobs:
  # ===========================================================================
  # Job 1: Unauthenticated Baseline Scan (passive spider + passive scan)
  # ===========================================================================
  zap-baseline:
    name: ZAP Baseline Scan
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set target URL
        id: target
        run: |
          URL="${{ github.event.inputs.target_url || env.DEFAULT_TARGET_URL }}"
          echo "url=$URL" >> $GITHUB_OUTPUT
          echo "Scan target: $URL"

      - name: Verify target is reachable
        id: reachable
        run: |
          HTTP_CODE=$(curl -s -o /dev/null -w "%{http_code}" --max-time 30 "${{ steps.target.outputs.url }}/api/health/live" 2>/dev/null) || HTTP_CODE="000"
          echo "http_code=$HTTP_CODE" >> $GITHUB_OUTPUT

          if [ "$HTTP_CODE" != "200" ]; then
            echo "::warning::Target ${{ steps.target.outputs.url }} returned HTTP $HTTP_CODE — skipping baseline scan"
            echo "## DAST Baseline Scan Skipped" >> $GITHUB_STEP_SUMMARY
            echo "" >> $GITHUB_STEP_SUMMARY
            echo "Target \`${{ steps.target.outputs.url }}\` is not reachable (HTTP $HTTP_CODE)." >> $GITHUB_STEP_SUMMARY
          else
            echo "Target is reachable (HTTP $HTTP_CODE)"
          fi

      - name: Run ZAP Baseline Scan
        if: steps.reachable.outputs.http_code == '200'
        uses: zaproxy/action-baseline@v0.14.0
        with:
          target: "${{ steps.target.outputs.url }}"
          rules_file_name: ".zap/rules.tsv"
          cmd_options: "-a -j"
          allow_issue_writing: false
          artifact_name: "zap-report"

      - name: Convert JSON report to SARIF
        if: steps.reachable.outputs.http_code == '200'
        run: |
          # ZAP writes report_json.json to the workspace root
          if [ -f "report_json.json" ]; then
            python3 .zap/json-to-sarif.py report_json.json zap-baseline.sarif
          else
            echo "::warning::No ZAP JSON report found — skipping SARIF conversion"
          fi

      - name: Upload SARIF artifact
        if: steps.reachable.outputs.http_code == '200' && hashFiles('zap-baseline.sarif') != ''
        uses: actions/upload-artifact@v7
        with:
          name: zap-sarif
          path: zap-baseline.sarif
          retention-days: 30

      - name: Generate scan summary
        if: steps.reachable.outputs.http_code == '200'
        run: |
          echo "## ZAP Baseline Scan Results" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "**Target:** \`${{ steps.target.outputs.url }}\`" >> $GITHUB_STEP_SUMMARY
          echo "**Scan type:** Baseline (passive spider + passive scan)" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "Download the \`zap-report\` artifact for the full HTML report." >> $GITHUB_STEP_SUMMARY
          echo "Download the \`zap-sarif\` artifact for SARIF findings (merged into consolidated security report)." >> $GITHUB_STEP_SUMMARY

  # ===========================================================================
  # Job 2: Authenticated Full Scan (active scan behind login wall)
  # ===========================================================================
  zap-authenticated:
    name: ZAP Authenticated Scan
    runs-on: ubuntu-latest
    environment: UAT

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set target URL
        id: target
        run: |
          URL="${{ github.event.inputs.target_url || env.DEFAULT_TARGET_URL }}"
          echo "url=$URL" >> $GITHUB_OUTPUT
          # Extract hostname for ZAP_AUTH_HEADER_SITE
          HOST=$(echo "$URL" | sed 's|https\?://||' | sed 's|/.*||')
          echo "host=$HOST" >> $GITHUB_OUTPUT
          echo "Scan target: $URL (host: $HOST)"

      - name: Verify target is reachable
        id: reachable
        run: |
          HTTP_CODE=$(curl -s -o /dev/null -w "%{http_code}" --max-time 30 "${{ steps.target.outputs.url }}/api/health/live" 2>/dev/null) || HTTP_CODE="000"
          echo "http_code=$HTTP_CODE" >> $GITHUB_OUTPUT

          if [ "$HTTP_CODE" != "200" ]; then
            echo "::warning::Target ${{ steps.target.outputs.url }} returned HTTP $HTTP_CODE — skipping authenticated scan"
            echo "## DAST Authenticated Scan Skipped" >> $GITHUB_STEP_SUMMARY
            echo "" >> $GITHUB_STEP_SUMMARY
            echo "Target \`${{ steps.target.outputs.url }}\` is not reachable (HTTP $HTTP_CODE)." >> $GITHUB_STEP_SUMMARY
          else
            echo "Target is reachable (HTTP $HTTP_CODE)"
          fi

      - name: Check auth secrets
        id: auth-check
        if: steps.reachable.outputs.http_code == '200'
        run: |
          if [ -z "${{ secrets.ZAP_AUTH_EMAIL }}" ] || [ -z "${{ secrets.ZAP_AUTH_PASSWORD }}" ]; then
            echo "::warning::ZAP_AUTH_EMAIL or ZAP_AUTH_PASSWORD secrets not configured — skipping authenticated scan"
            echo "has_secrets=false" >> $GITHUB_OUTPUT
            echo "## DAST Authenticated Scan Skipped" >> $GITHUB_STEP_SUMMARY
            echo "" >> $GITHUB_STEP_SUMMARY
            echo "Auth secrets not configured. Add \`ZAP_AUTH_EMAIL\` and \`ZAP_AUTH_PASSWORD\` to the UAT environment." >> $GITHUB_STEP_SUMMARY
          else
            echo "has_secrets=true" >> $GITHUB_OUTPUT
          fi

      - name: Authenticate and get JWT token
        id: auth
        if: steps.reachable.outputs.http_code == '200' && steps.auth-check.outputs.has_secrets == 'true'
        run: |
          RESPONSE=$(curl -s -X POST "${{ steps.target.outputs.url }}/api/auth/login" \
            -H "Content-Type: application/json" \
            -d "{\"email\":\"${{ secrets.ZAP_AUTH_EMAIL }}\",\"password\":\"${{ secrets.ZAP_AUTH_PASSWORD }}\"}" \
            --max-time 30 2>/dev/null)

          TOKEN=$(echo "$RESPONSE" | python3 -c "import sys,json; print(json.load(sys.stdin).get('accessToken',''))" 2>/dev/null)

          if [ -z "$TOKEN" ]; then
            echo "::warning::Authentication failed — skipping authenticated scan"
            echo "auth_success=false" >> $GITHUB_OUTPUT
            echo "## DAST Authenticated Scan Skipped" >> $GITHUB_STEP_SUMMARY
            echo "" >> $GITHUB_STEP_SUMMARY
            echo "Authentication failed. Verify ZAP scanner user exists on UAT and secrets are correct." >> $GITHUB_STEP_SUMMARY
          else
            echo "auth_success=true" >> $GITHUB_OUTPUT
            # Mask the token in logs
            echo "::add-mask::$TOKEN"
            echo "token=$TOKEN" >> $GITHUB_OUTPUT
            echo "Successfully authenticated as ${{ secrets.ZAP_AUTH_EMAIL }}"
          fi

      - name: Run ZAP Full Scan (Authenticated)
        if: steps.auth.outputs.auth_success == 'true'
        uses: zaproxy/action-full-scan@v0.13.0
        with:
          target: "${{ steps.target.outputs.url }}"
          rules_file_name: ".zap/rules.tsv"
          cmd_options: "-a -j"
          allow_issue_writing: false
          artifact_name: "zap-auth-report"
        env:
          ZAP_AUTH_HEADER: "Authorization"
          ZAP_AUTH_HEADER_VALUE: "Bearer ${{ steps.auth.outputs.token }}"
          ZAP_AUTH_HEADER_SITE: "${{ steps.target.outputs.host }}"

      - name: Convert JSON report to SARIF
        if: steps.auth.outputs.auth_success == 'true'
        run: |
          if [ -f "report_json.json" ]; then
            python3 .zap/json-to-sarif.py report_json.json zap-authenticated.sarif
          else
            echo "::warning::No ZAP JSON report found — skipping SARIF conversion"
          fi

      - name: Upload SARIF artifact
        if: steps.auth.outputs.auth_success == 'true' && hashFiles('zap-authenticated.sarif') != ''
        uses: actions/upload-artifact@v7
        with:
          name: zap-auth-sarif
          path: zap-authenticated.sarif
          retention-days: 30

      - name: Generate scan summary
        if: steps.auth.outputs.auth_success == 'true'
        run: |
          echo "## ZAP Authenticated Full Scan Results" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "**Target:** \`${{ steps.target.outputs.url }}\`" >> $GITHUB_STEP_SUMMARY
          echo "**Scan type:** Full Scan (active spider + active scan, authenticated)" >> $GITHUB_STEP_SUMMARY
          echo "**Auth user:** \`${{ secrets.ZAP_AUTH_EMAIL }}\`" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "Download the \`zap-auth-report\` artifact for the full HTML report." >> $GITHUB_STEP_SUMMARY
          echo "Download the \`zap-auth-sarif\` artifact for SARIF findings (merged into consolidated security report)." >> $GITHUB_STEP_SUMMARY
