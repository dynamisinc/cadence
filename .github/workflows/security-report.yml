name: Security Report

on:
  schedule:
    # Weekly on Monday at 6 AM UTC (after quick DAST scan at 2 AM has completed)
    - cron: "0 6 * * 1"
    # Monthly on 1st at 7 AM UTC (after full API scan at 3 AM has completed)
    - cron: "0 7 1 * *"
  workflow_dispatch:

permissions:
  contents: read
  issues: write

jobs:
  generate-report:
    name: Generate Consolidated Security Report
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Create working directory
        run: mkdir -p sarif-inputs report-output

      # Download SARIF artifacts from latest successful runs of each security workflow.
      # Uses the GitHub REST API since actions/download-artifact only works within the same run.
      - name: Download SAST SARIF artifact
        id: sast
        run: |
          echo "Fetching latest SAST artifact..."
          ARTIFACT_URL=$(gh api \
            "repos/${{ github.repository }}/actions/workflows/security-sast.yml/runs?status=completed&per_page=5" \
            --jq '.workflow_runs[0].id' 2>/dev/null) || true

          if [ -n "$ARTIFACT_URL" ] && [ "$ARTIFACT_URL" != "null" ]; then
            RUN_ID=$ARTIFACT_URL
            # Get artifact download URL
            DOWNLOAD_URL=$(gh api \
              "repos/${{ github.repository }}/actions/runs/$RUN_ID/artifacts" \
              --jq '.artifacts[] | select(.name == "semgrep-sarif") | .archive_download_url' 2>/dev/null) || true

            if [ -n "$DOWNLOAD_URL" ] && [ "$DOWNLOAD_URL" != "null" ]; then
              gh api "$DOWNLOAD_URL" > /tmp/sast.zip 2>/dev/null && \
              unzip -o /tmp/sast.zip -d sarif-inputs/ 2>/dev/null && \
              echo "found=true" >> $GITHUB_OUTPUT && \
              echo "SAST SARIF downloaded successfully" || \
              echo "found=false" >> $GITHUB_OUTPUT
            else
              echo "found=false" >> $GITHUB_OUTPUT
              echo "::notice::No SAST artifact found — SAST workflow may not have run yet"
            fi
          else
            echo "found=false" >> $GITHUB_OUTPUT
            echo "::notice::No SAST workflow runs found"
          fi
        env:
          GH_TOKEN: ${{ github.token }}

      - name: Download IaC SARIF artifact
        id: iac
        run: |
          echo "Fetching latest IaC artifact..."
          ARTIFACT_URL=$(gh api \
            "repos/${{ github.repository }}/actions/workflows/security-iac.yml/runs?status=completed&per_page=5" \
            --jq '.workflow_runs[0].id' 2>/dev/null) || true

          if [ -n "$ARTIFACT_URL" ] && [ "$ARTIFACT_URL" != "null" ]; then
            RUN_ID=$ARTIFACT_URL
            DOWNLOAD_URL=$(gh api \
              "repos/${{ github.repository }}/actions/runs/$RUN_ID/artifacts" \
              --jq '.artifacts[] | select(.name == "checkov-sarif") | .archive_download_url' 2>/dev/null) || true

            if [ -n "$DOWNLOAD_URL" ] && [ "$DOWNLOAD_URL" != "null" ]; then
              gh api "$DOWNLOAD_URL" > /tmp/iac.zip 2>/dev/null && \
              unzip -o /tmp/iac.zip -d sarif-inputs/ 2>/dev/null && \
              echo "found=true" >> $GITHUB_OUTPUT && \
              echo "IaC SARIF downloaded successfully" || \
              echo "found=false" >> $GITHUB_OUTPUT
            else
              echo "found=false" >> $GITHUB_OUTPUT
              echo "::notice::No IaC artifact found — IaC workflow may not have run yet"
            fi
          else
            echo "found=false" >> $GITHUB_OUTPUT
            echo "::notice::No IaC workflow runs found"
          fi
        env:
          GH_TOKEN: ${{ github.token }}

      - name: Download DAST HTML report
        id: dast
        run: |
          echo "Fetching latest DAST artifact..."
          ARTIFACT_URL=$(gh api \
            "repos/${{ github.repository }}/actions/workflows/security-dast.yml/runs?status=completed&per_page=5" \
            --jq '.workflow_runs[0].id' 2>/dev/null) || true

          if [ -n "$ARTIFACT_URL" ] && [ "$ARTIFACT_URL" != "null" ]; then
            RUN_ID=$ARTIFACT_URL
            DOWNLOAD_URL=$(gh api \
              "repos/${{ github.repository }}/actions/runs/$RUN_ID/artifacts" \
              --jq '.artifacts[] | select(.name == "zap-report") | .archive_download_url' 2>/dev/null) || true

            if [ -n "$DOWNLOAD_URL" ] && [ "$DOWNLOAD_URL" != "null" ]; then
              gh api "$DOWNLOAD_URL" > /tmp/dast.zip 2>/dev/null && \
              unzip -o /tmp/dast.zip -d report-output/ 2>/dev/null && \
              echo "found=true" >> $GITHUB_OUTPUT && \
              echo "DAST report downloaded successfully" || \
              echo "found=false" >> $GITHUB_OUTPUT
            else
              echo "found=false" >> $GITHUB_OUTPUT
              echo "::notice::No DAST artifact found — DAST workflow may not have run yet"
            fi
          else
            echo "found=false" >> $GITHUB_OUTPUT
            echo "::notice::No DAST workflow runs found"
          fi
        env:
          GH_TOKEN: ${{ github.token }}

      - name: Download ZAP Baseline SARIF artifact
        id: zap-sarif
        run: |
          echo "Fetching latest ZAP baseline SARIF artifact..."
          # Get the latest completed DAST run ID
          RUN_ID=$(gh api \
            "repos/${{ github.repository }}/actions/workflows/security-dast.yml/runs?status=completed&per_page=5" \
            --jq '.workflow_runs[0].id' 2>/dev/null) || true

          if [ -n "$RUN_ID" ] && [ "$RUN_ID" != "null" ]; then
            DOWNLOAD_URL=$(gh api \
              "repos/${{ github.repository }}/actions/runs/$RUN_ID/artifacts" \
              --jq '.artifacts[] | select(.name == "zap-sarif") | .archive_download_url' 2>/dev/null) || true

            if [ -n "$DOWNLOAD_URL" ] && [ "$DOWNLOAD_URL" != "null" ]; then
              gh api "$DOWNLOAD_URL" > /tmp/zap-sarif.zip 2>/dev/null && \
              unzip -o /tmp/zap-sarif.zip -d sarif-inputs/ 2>/dev/null && \
              echo "found=true" >> $GITHUB_OUTPUT && \
              echo "ZAP baseline SARIF downloaded successfully" || \
              echo "found=false" >> $GITHUB_OUTPUT
            else
              echo "found=false" >> $GITHUB_OUTPUT
              echo "::notice::No ZAP baseline SARIF artifact found"
            fi
          else
            echo "found=false" >> $GITHUB_OUTPUT
          fi
        env:
          GH_TOKEN: ${{ github.token }}

      - name: Download ZAP Authenticated SARIF artifact
        id: zap-auth-sarif
        run: |
          echo "Fetching latest ZAP authenticated SARIF artifact..."
          RUN_ID=$(gh api \
            "repos/${{ github.repository }}/actions/workflows/security-dast.yml/runs?status=completed&per_page=5" \
            --jq '.workflow_runs[0].id' 2>/dev/null) || true

          if [ -n "$RUN_ID" ] && [ "$RUN_ID" != "null" ]; then
            DOWNLOAD_URL=$(gh api \
              "repos/${{ github.repository }}/actions/runs/$RUN_ID/artifacts" \
              --jq '.artifacts[] | select(.name == "zap-auth-sarif") | .archive_download_url' 2>/dev/null) || true

            if [ -n "$DOWNLOAD_URL" ] && [ "$DOWNLOAD_URL" != "null" ]; then
              gh api "$DOWNLOAD_URL" > /tmp/zap-auth-sarif.zip 2>/dev/null && \
              unzip -o /tmp/zap-auth-sarif.zip -d sarif-inputs/ 2>/dev/null && \
              echo "found=true" >> $GITHUB_OUTPUT && \
              echo "ZAP authenticated SARIF downloaded successfully" || \
              echo "found=false" >> $GITHUB_OUTPUT
            else
              echo "found=false" >> $GITHUB_OUTPUT
              echo "::notice::No ZAP authenticated SARIF artifact found"
            fi
          else
            echo "found=false" >> $GITHUB_OUTPUT
          fi
        env:
          GH_TOKEN: ${{ github.token }}

      - name: Merge SARIF and generate reports
        id: report
        run: |
          python3 << 'PYEOF'
          import json, html, glob, os, sys
          from datetime import datetime
          from collections import Counter

          sarif_files = glob.glob("sarif-inputs/*.sarif")
          print(f"Found {len(sarif_files)} SARIF file(s): {sarif_files}")

          if not sarif_files:
              print("No SARIF files found")
              with open(os.environ["GITHUB_OUTPUT"], "a") as f:
                  f.write("has_sarif=false\n")
              sys.exit(0)

          # Merge: combine all runs from all SARIF files into one
          merged = {"version": "2.1.0", "$schema": "https://json.schemastore.org/sarif-2.1.0.json", "runs": []}
          for path in sarif_files:
              print(f"  Reading {path} ({os.path.getsize(path)} bytes)")
              with open(path) as f:
                  data = json.load(f)
              merged["runs"].extend(data.get("runs", []))

          # Write merged SARIF
          with open("report-output/consolidated-security-report.sarif", "w") as f:
              json.dump(merged, f, indent=2)
          print(f"Merged SARIF written with {len(merged['runs'])} run(s)")

          # Extract findings
          findings = []
          for run in merged["runs"]:
              tool = run.get("tool", {}).get("driver", {}).get("name", "Unknown")
              for result in run.get("results", []):
                  level = result.get("level", "note")
                  rule_id = result.get("ruleId", "N/A")
                  message = result.get("message", {}).get("text", "No description")
                  locations = result.get("locations", [])
                  loc_str = ""
                  if locations:
                      phys = locations[0].get("physicalLocation", {})
                      artifact = phys.get("artifactLocation", {}).get("uri", "")
                      region = phys.get("region", {})
                      line = region.get("startLine", "")
                      loc_str = f"{artifact}:{line}" if line else artifact
                  findings.append({"tool": tool, "level": level, "rule": rule_id,
                                   "message": message, "location": loc_str})

          level_order = {"error": 0, "warning": 1, "note": 2, "none": 3}
          findings.sort(key=lambda f: level_order.get(f["level"], 99))

          level_colors = {"error": "#d32f2f", "warning": "#f57c00", "note": "#1976d2", "none": "#757575"}
          level_labels = {"error": "Critical/Error", "warning": "Warning", "note": "Note", "none": "Info"}
          level_counts = Counter(f["level"] for f in findings)

          # Compute unique rules and duplicates per severity
          rules_by_level = {}
          for level in ["error", "warning", "note", "none"]:
              rules_in_level = set()
              for f in findings:
                  if f["level"] == level:
                      rules_in_level.add(f["rule"])
              rules_by_level[level] = rules_in_level

          # Also compute per-tool breakdown
          tool_counts = Counter(f["tool"] for f in findings)

          # Deduplicate findings by (tool, level, rule) for the HTML table
          from collections import defaultdict
          grouped = defaultdict(lambda: {"message": "", "locations": [], "count": 0})
          for f in findings:
              key = (f["tool"], f["level"], f["rule"])
              entry = grouped[key]
              if entry["count"] == 0:
                  entry["message"] = f["message"]
                  entry["tool"] = f["tool"]
                  entry["level"] = f["level"]
                  entry["rule"] = f["rule"]
              if f["location"] and f["location"] not in entry["locations"]:
                  entry["locations"].append(f["location"])
              entry["count"] += 1
          deduped = list(grouped.values())
          deduped.sort(key=lambda d: (level_order.get(d["level"], 99), -d["count"]))

          # Generate HTML report
          now = datetime.utcnow().strftime("%Y-%m-%d %H:%M UTC")
          h = f"""<!DOCTYPE html>
          <html><head><meta charset="utf-8">
          <title>Cadence Security Report - {now}</title>
          <style>
            body {{ font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; margin: 2rem; color: #333; }}
            h1 {{ color: #1a237e; }} h2 {{ color: #283593; margin-top: 2rem; }}
            table {{ border-collapse: collapse; width: 100%; margin: 1rem 0; }}
            th, td {{ border: 1px solid #ddd; padding: 8px 12px; text-align: left; }}
            th {{ background: #f5f5f5; }} tr:hover {{ background: #fafafa; }}
            .badge {{ padding: 2px 8px; border-radius: 4px; color: white; font-size: 0.85em; }}
            .summary {{ display: flex; gap: 1rem; margin: 1rem 0; flex-wrap: wrap; }}
            .card {{ padding: 1rem; border-radius: 8px; min-width: 140px; text-align: center; color: white; }}
            .card-sub {{ font-size: 0.75em; opacity: 0.9; margin-top: 4px; }}
            td code {{ font-size: 0.85em; word-break: break-all; }}
          </style></head><body>
          <h1>Cadence Security Report</h1>
          <p><strong>Generated:</strong> {now}</p>
          <div class="summary">"""

          for level in ["error", "warning", "note", "none"]:
              count = level_counts.get(level, 0)
              unique = len(rules_by_level[level])
              dupes = count - unique
              h += f'<div class="card" style="background:{level_colors[level]}">'
              h += f'<div style="font-size:2em;font-weight:bold">{count}</div>'
              h += f'<div>{level_labels[level]}</div>'
              if count > 0:
                  h += f'<div class="card-sub">{unique} unique rule{"s" if unique != 1 else ""}'
                  if dupes > 0:
                      h += f', {dupes} duplicate{"s" if dupes != 1 else ""}'
                  h += '</div>'
              h += '</div>'

          h += f'</div><p><strong>Total findings:</strong> {len(findings)}</p>'

          # Per-tool breakdown table
          h += '<h2>Findings by Tool</h2><table>'
          h += '<tr><th>Tool</th><th>Total</th><th>Unique Rules</th><th>Duplicates</th></tr>'
          for tool_name, tool_total in sorted(tool_counts.items()):
              tool_rules = set(f["rule"] for f in findings if f["tool"] == tool_name)
              tool_dupes = tool_total - len(tool_rules)
              h += f'<tr><td>{html.escape(tool_name)}</td><td>{tool_total}</td>'
              h += f'<td>{len(tool_rules)}</td><td>{tool_dupes}</td></tr>'
          h += '</table>'

          h += '<h2>Findings (Deduplicated by Rule)</h2>'
          h += '<table><tr><th>Severity</th><th>Tool</th><th>Rule</th><th>Instances</th><th>Message</th><th>Locations</th></tr>'

          for d in deduped:
              badge = f'<span class="badge" style="background:{level_colors[d["level"]]}">{level_labels[d["level"]]}</span>'
              locs = d["locations"]
              if not locs:
                  loc_html = "<em>N/A</em>"
              elif len(locs) <= 3:
                  loc_html = "<br>".join(f"<code>{html.escape(l)}</code>" for l in locs)
              else:
                  loc_html = "<br>".join(f"<code>{html.escape(l)}</code>" for l in locs[:3])
                  loc_html += f"<br><em>...and {len(locs) - 3} more</em>"
              h += f'<tr><td>{badge}</td><td>{html.escape(d["tool"])}</td><td>{html.escape(d["rule"])}</td>'
              h += f'<td style="text-align:center">{d["count"]}</td>'
              h += f'<td>{html.escape(d["message"][:200])}</td><td>{loc_html}</td></tr>'

          h += '</table></body></html>'

          with open("report-output/consolidated-security-report.html", "w") as out:
              out.write(h)

          print(f"HTML report generated: {len(findings)} findings")

          # Write summary stats to GITHUB_OUTPUT
          with open(os.environ["GITHUB_OUTPUT"], "a") as f:
              f.write("has_sarif=true\n")
              f.write(f"total={len(findings)}\n")
              f.write(f"unique_findings={len(deduped)}\n")
              f.write(f"errors={level_counts.get('error', 0)}\n")
              f.write(f"warnings={level_counts.get('warning', 0)}\n")
              f.write(f"notes={level_counts.get('note', 0)}\n")
              f.write(f"errors_unique={len(rules_by_level.get('error', set()))}\n")
              f.write(f"warnings_unique={len(rules_by_level.get('warning', set()))}\n")
              f.write(f"notes_unique={len(rules_by_level.get('note', set()))}\n")
              # Per-tool summary
              tool_summary = "; ".join(f"{t}: {c}" for t, c in sorted(tool_counts.items()))
              f.write(f"tool_summary={tool_summary}\n")
          PYEOF

      - name: Generate executive summary
        if: always()
        run: |
          echo "## Consolidated Security Report" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "**Generated:** $(date -u '+%Y-%m-%d %H:%M UTC')" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY

          # Source scan availability
          echo "### Source Scans" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| Scan Type | Available |" >> $GITHUB_STEP_SUMMARY
          echo "|-----------|-----------|" >> $GITHUB_STEP_SUMMARY
          echo "| SAST (Semgrep) | ${{ steps.sast.outputs.found == 'true' && 'Yes' || 'No' }} |" >> $GITHUB_STEP_SUMMARY
          echo "| IaC (Checkov) | ${{ steps.iac.outputs.found == 'true' && 'Yes' || 'No' }} |" >> $GITHUB_STEP_SUMMARY
          echo "| DAST (ZAP HTML) | ${{ steps.dast.outputs.found == 'true' && 'Yes' || 'No' }} |" >> $GITHUB_STEP_SUMMARY
          echo "| DAST Baseline (SARIF) | ${{ steps.zap-sarif.outputs.found == 'true' && 'Yes' || 'No' }} |" >> $GITHUB_STEP_SUMMARY
          echo "| DAST API Scan (SARIF) | ${{ steps.zap-auth-sarif.outputs.found == 'true' && 'Yes' || 'No' }} |" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY

          if [ "${{ steps.report.outputs.has_sarif }}" == "true" ]; then
            echo "### Findings Summary" >> $GITHUB_STEP_SUMMARY
            echo "" >> $GITHUB_STEP_SUMMARY
            echo "**Total instances:** ${{ steps.report.outputs.total }} | **Unique findings:** ${{ steps.report.outputs.unique_findings }}" >> $GITHUB_STEP_SUMMARY
            echo "" >> $GITHUB_STEP_SUMMARY
            echo "| Severity | Total | Unique Rules | Duplicates |" >> $GITHUB_STEP_SUMMARY
            echo "|----------|-------|--------------|------------|" >> $GITHUB_STEP_SUMMARY

            ERRORS=${{ steps.report.outputs.errors }}
            ERRORS_U=${{ steps.report.outputs.errors_unique }}
            ERRORS_D=$((ERRORS - ERRORS_U))
            echo "| Critical/Error | $ERRORS | $ERRORS_U | $ERRORS_D |" >> $GITHUB_STEP_SUMMARY

            WARNINGS=${{ steps.report.outputs.warnings }}
            WARNINGS_U=${{ steps.report.outputs.warnings_unique }}
            WARNINGS_D=$((WARNINGS - WARNINGS_U))
            echo "| Warning | $WARNINGS | $WARNINGS_U | $WARNINGS_D |" >> $GITHUB_STEP_SUMMARY

            NOTES=${{ steps.report.outputs.notes }}
            NOTES_U=${{ steps.report.outputs.notes_unique }}
            NOTES_D=$((NOTES - NOTES_U))
            echo "| Note/Info | $NOTES | $NOTES_U | $NOTES_D |" >> $GITHUB_STEP_SUMMARY

            echo "" >> $GITHUB_STEP_SUMMARY

            if [ -n "${{ steps.report.outputs.tool_summary }}" ]; then
              echo "**By tool:** ${{ steps.report.outputs.tool_summary }}" >> $GITHUB_STEP_SUMMARY
            fi
          else
            echo "No SARIF findings to summarize (no upstream scan artifacts available)." >> $GITHUB_STEP_SUMMARY
          fi

          echo "" >> $GITHUB_STEP_SUMMARY
          echo "### Artifacts" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "Download the report artifacts from this workflow run:" >> $GITHUB_STEP_SUMMARY
          echo "- **security-report-html** — Consolidated HTML report" >> $GITHUB_STEP_SUMMARY
          echo "- **security-report-sarif** — Raw merged SARIF file" >> $GITHUB_STEP_SUMMARY
          echo "- **security-report-dast** — ZAP HTML report (if available)" >> $GITHUB_STEP_SUMMARY

      # Upload consolidated SARIF
      - name: Upload consolidated SARIF
        if: steps.report.outputs.has_sarif == 'true'
        uses: actions/upload-artifact@v7
        with:
          name: security-report-sarif
          path: report-output/consolidated-security-report.sarif
          retention-days: 90

      # Upload HTML report
      - name: Upload HTML report
        if: steps.report.outputs.has_sarif == 'true'
        uses: actions/upload-artifact@v7
        with:
          name: security-report-html
          path: report-output/consolidated-security-report.html
          retention-days: 90

      # Upload DAST report separately
      - name: Upload DAST HTML report
        if: steps.dast.outputs.found == 'true'
        uses: actions/upload-artifact@v7
        with:
          name: security-report-dast
          path: report-output/report_html.html
          retention-days: 90
          if-no-files-found: ignore

      # Ensure the security-report label exists
      - name: Ensure issue label exists
        if: steps.report.outputs.has_sarif == 'true'
        run: |
          gh label create "security-report" --description "Automated security scan report" --color "d93f0b" 2>/dev/null || true
        env:
          GH_TOKEN: ${{ github.token }}

      # Notification: create a GitHub Issue with the report summary.
      # This leverages GitHub's built-in notification system — repo watchers
      # get email/mobile notifications automatically, no SMTP secrets needed.
      - name: Create security report issue
        if: steps.report.outputs.has_sarif == 'true'
        env:
          GH_TOKEN: ${{ github.token }}
          REPORT_TOTAL: ${{ steps.report.outputs.total }}
          REPORT_UNIQUE: ${{ steps.report.outputs.unique_findings }}
          REPORT_ERRORS: ${{ steps.report.outputs.errors }}
          REPORT_ERRORS_U: ${{ steps.report.outputs.errors_unique }}
          REPORT_WARNINGS: ${{ steps.report.outputs.warnings }}
          REPORT_WARNINGS_U: ${{ steps.report.outputs.warnings_unique }}
          REPORT_NOTES: ${{ steps.report.outputs.notes }}
          REPORT_NOTES_U: ${{ steps.report.outputs.notes_unique }}
          REPORT_TOOLS: ${{ steps.report.outputs.tool_summary }}
          SAST_OK: ${{ steps.sast.outputs.found == 'true' && '✅' || '—' }}
          IAC_OK: ${{ steps.iac.outputs.found == 'true' && '✅' || '—' }}
          ZAP_SARIF_OK: ${{ steps.zap-sarif.outputs.found == 'true' && '✅' || '—' }}
          ZAP_AUTH_OK: ${{ steps.zap-auth-sarif.outputs.found == 'true' && '✅' || '—' }}
          EVENT_SCHEDULE: ${{ github.event.schedule }}
        run: |
          DATE=$(date -u '+%Y-%m-%d')
          RUN_URL="${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}"

          if [ "$EVENT_SCHEDULE" == "0 7 1 * *" ]; then
            REPORT_TYPE="Monthly (includes full API scan)"
          else
            REPORT_TYPE="Weekly"
          fi

          # Write issue body to a temp file (avoids YAML heredoc issues)
          cat > /tmp/issue-body.md << EOF
          ## Security Report — ${REPORT_TYPE}

          **Date:** ${DATE}
          **Total instances:** ${REPORT_TOTAL} | **Unique findings:** ${REPORT_UNIQUE}

          ### Findings Summary

          | Severity | Total | Unique Rules |
          |----------|-------|--------------|
          | Critical/Error | ${REPORT_ERRORS} | ${REPORT_ERRORS_U} |
          | Warning | ${REPORT_WARNINGS} | ${REPORT_WARNINGS_U} |
          | Note/Info | ${REPORT_NOTES} | ${REPORT_NOTES_U} |

          **By tool:** ${REPORT_TOOLS}

          ### Source Scans

          | Scan | Available |
          |------|-----------|
          | SAST (Semgrep) | ${SAST_OK} |
          | IaC (Checkov) | ${IAC_OK} |
          | DAST Baseline (SARIF) | ${ZAP_SARIF_OK} |
          | DAST API Scan (SARIF) | ${ZAP_AUTH_OK} |

          ### Reports

          Download the full reports from the [workflow run](${RUN_URL}):
          - **security-report-html** — Consolidated HTML report
          - **security-report-sarif** — Merged SARIF file (all instances)
          - **security-report-dast** — ZAP HTML report

          ---
          *Auto-generated by the Security Report workflow. Close this issue once reviewed.*
          EOF

          # Close any previous open security report issues to avoid clutter
          OPEN_ISSUES=$(gh issue list --label "security-report" --state open --json number --jq '.[].number' 2>/dev/null) || true
          for ISSUE_NUM in $OPEN_ISSUES; do
            gh issue close "$ISSUE_NUM" --comment "Superseded by new security report for $DATE." 2>/dev/null || true
          done

          # Create the new issue
          gh issue create \
            --title "Security Report — $DATE ($REPORT_TYPE)" \
            --body-file /tmp/issue-body.md \
            --label "security-report"
