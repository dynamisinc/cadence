name: Deploy Backend

on:
  workflow_run:
    workflows: ["CI"]
    types: [completed]
    branches: [main]
  workflow_dispatch:
    inputs:
      environment:
        description: "Environment to deploy to"
        required: true
        default: "uat"
        type: choice
        options:
          - uat
          - production

env:
  DOTNET_VERSION: "10.0.x"
  WEBAPI_PROJECT_PATH: "src/Cadence.WebApi"

concurrency:
  group: deploy-backend-${{ github.ref }}
  cancel-in-progress: false

jobs:
  check-changes:
    name: Check for Backend Changes
    runs-on: ubuntu-latest
    if: ${{ github.event_name == 'workflow_dispatch' || github.event.workflow_run.conclusion == 'success' }}
    outputs:
      backend_changed: ${{ steps.changes.outputs.backend }}
      migrations_changed: ${{ steps.changes.outputs.migrations }}
    steps:
      - name: Checkout code
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Get changed files
        id: changes
        run: |
          if [ "${{ github.event_name }}" == "workflow_run" ]; then
            BASE_SHA="${{ github.event.workflow_run.head_commit.id }}~1"
            HEAD_SHA="${{ github.event.workflow_run.head_commit.id }}"
          else
            # Manual trigger always deploys
            echo "backend=true" >> $GITHUB_OUTPUT
            echo "migrations=true" >> $GITHUB_OUTPUT
            exit 0
          fi

          # Check for backend changes (includes test projects)
          CHANGES=$(git diff --name-only $BASE_SHA $HEAD_SHA | grep -E '^src/Cadence\.(Core|WebApi)(\.Tests)?/' || true)
          if [ -n "$CHANGES" ]; then
            echo "backend=true" >> $GITHUB_OUTPUT
            echo "Changed files:"
            echo "$CHANGES"
          else
            echo "backend=false" >> $GITHUB_OUTPUT
          fi

          # Check for migration changes
          if git diff --name-only $BASE_SHA $HEAD_SHA | grep -qE '^src/Cadence\.Core/Migrations/'; then
            echo "migrations=true" >> $GITHUB_OUTPUT
          else
            echo "migrations=false" >> $GITHUB_OUTPUT
          fi

  build:
    name: Build Backend
    runs-on: ubuntu-latest
    needs: check-changes
    if: needs.check-changes.outputs.backend_changed == 'true'

    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Setup .NET
        uses: actions/setup-dotnet@v5
        with:
          dotnet-version: ${{ env.DOTNET_VERSION }}

      - name: Get version from manifest
        id: version
        run: |
          VERSION=$(jq -r '."src/Cadence.Core"' .release-please-manifest.json)
          SHA=$(git rev-parse --short HEAD)
          echo "full=${VERSION}+${SHA}" >> $GITHUB_OUTPUT
          echo "API version: ${VERSION}+${SHA}"

      - name: Restore dependencies
        run: dotnet restore ${{ env.WEBAPI_PROJECT_PATH }}/Cadence.WebApi.csproj

      - name: Build
        run: dotnet build ${{ env.WEBAPI_PROJECT_PATH }}/Cadence.WebApi.csproj --configuration Release --no-restore /p:InformationalVersion=${{ steps.version.outputs.full }}

      - name: Run Core tests
        run: dotnet test src/Cadence.Core.Tests/Cadence.Core.Tests.csproj --configuration Release --verbosity normal

      - name: Run WebApi tests
        run: dotnet test src/Cadence.WebApi.Tests/Cadence.WebApi.Tests.csproj --configuration Release --verbosity normal

      - name: Publish
        run: dotnet publish ${{ env.WEBAPI_PROJECT_PATH }}/Cadence.WebApi.csproj --configuration Release --output ./publish/webapi /p:InformationalVersion=${{ steps.version.outputs.full }}

      - name: Upload artifact
        uses: actions/upload-artifact@v7
        with:
          name: web-api
          path: ./publish/webapi
          retention-days: 1

  deploy:
    name: Deploy Backend
    runs-on: ubuntu-latest
    needs: [check-changes, build]
    environment:
      name: ${{ github.event.inputs.environment || 'uat' }}
      url: ${{ steps.deploy-webapi.outputs.webapp-url }}

    steps:
      - name: Checkout code (for migrations)
        if: needs.check-changes.outputs.migrations_changed == 'true'
        uses: actions/checkout@v6

      - name: Setup .NET (for migrations)
        if: needs.check-changes.outputs.migrations_changed == 'true'
        uses: actions/setup-dotnet@v5
        with:
          dotnet-version: ${{ env.DOTNET_VERSION }}

      - name: Install EF Core tools
        if: needs.check-changes.outputs.migrations_changed == 'true'
        run: |
          dotnet tool install --global dotnet-ef || dotnet tool update --global dotnet-ef
          echo "$HOME/.dotnet/tools" >> $GITHUB_PATH

      - name: Clean obj folders before migration
        if: needs.check-changes.outputs.migrations_changed == 'true'
        run: |
          rm -rf src/Cadence.Core/obj
          rm -rf src/Cadence.Core/bin
          rm -rf src/Cadence.WebApi/obj
          rm -rf src/Cadence.WebApi/bin

      - name: Restore dependencies (for migrations)
        if: needs.check-changes.outputs.migrations_changed == 'true'
        run: dotnet restore src/Cadence.WebApi/Cadence.WebApi.csproj

      - name: Build before migrations
        if: needs.check-changes.outputs.migrations_changed == 'true'
        run: |
          echo "=== Building Core project with diagnostic output ==="
          dotnet build src/Cadence.Core/Cadence.Core.csproj --configuration Release -v diag 2>&1 | grep -i "compile\|\.cs\|\*\*" | head -100
          
          echo ""
          echo "=== Building WebApi project ==="
          dotnet build src/Cadence.WebApi/Cadence.WebApi.csproj --configuration Release
    
      - name: Apply EF Core migrations
        if: needs.check-changes.outputs.migrations_changed == 'true'
        run: |
          echo "Applying EF Core migrations to database..."
          ~/.dotnet/tools/dotnet-ef database update \
            --project src/Cadence.Core/Cadence.Core.csproj \
            --startup-project src/Cadence.WebApi/Cadence.WebApi.csproj \
            --connection "${{ secrets.AZURE_SQL_CONNECTION_STRING }}" \
            --configuration Release \
            --context AppDbContext \
            --no-build \
            --verbose
        env:
          DOTNET_ENVIRONMENT: Production

      - name: Download artifact
        uses: actions/download-artifact@v8
        with:
          name: web-api
          path: ./web-api

      - name: Deploy to Azure Web App
        id: deploy-webapi
        uses: azure/webapps-deploy@v3
        with:
          app-name: ${{ vars.AZURE_WEBAPP_NAME }}
          package: ./web-api
          publish-profile: ${{ secrets.AZURE_WEBAPP_PUBLISH_PROFILE }}

      - name: Health check
        run: |
          WEBAPP_URL="${{ steps.deploy-webapi.outputs.webapp-url }}"
          echo "Checking liveness at: ${WEBAPP_URL}/api/health/live"
          echo "Waiting 30 seconds for app to start..."
          sleep 30

          MAX_ATTEMPTS=12
          for i in $(seq 1 $MAX_ATTEMPTS); do
            echo "Health check attempt $i/$MAX_ATTEMPTS..."
            response=$(curl -s -o /dev/null -w "%{http_code}" --max-time 15 "${WEBAPP_URL}/api/health/live" 2>/dev/null) || response="000"
            if [ "$response" = "200" ]; then
              echo "Health check passed!"
              exit 0
            fi
            echo "Got status $response, waiting 15 seconds before retry..."
            sleep 15
          done

          echo "Health check failed after $MAX_ATTEMPTS attempts"
          echo "Final response from readiness endpoint:"
          curl -sv --max-time 15 "${WEBAPP_URL}/api/health/ready" 2>&1 || true
          exit 1

  skip-deploy:
    name: Skip Backend Deploy (No Changes)
    runs-on: ubuntu-latest
    needs: check-changes
    if: needs.check-changes.outputs.backend_changed == 'false'
    steps:
      - name: Log skip reason
        run: |
          echo "Skipping backend deployment - no backend changes detected"
          echo "To force deployment, use workflow_dispatch manually"
