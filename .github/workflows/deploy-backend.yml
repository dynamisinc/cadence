name: Deploy Backend

on:
  workflow_run:
    workflows: ["CI"]
    types: [completed]
    branches: [main]
  workflow_dispatch:
    inputs:
      environment:
        description: "Environment to deploy to"
        required: true
        default: "production"
        type: choice
        options:
          - production
          - staging

env:
  DOTNET_VERSION: "10.0.x"
  AZURE_WEBAPP_NAME: "cadence-api"  # TODO: Update with your Azure Web App name
  WEBAPI_PROJECT_PATH: "src/Cadence.WebApi"

concurrency:
  group: deploy-backend-${{ github.ref }}
  cancel-in-progress: false

jobs:
  check-changes:
    name: Check for Backend Changes
    runs-on: ubuntu-latest
    if: ${{ github.event_name == 'workflow_dispatch' || github.event.workflow_run.conclusion == 'success' }}
    outputs:
      backend_changed: ${{ steps.changes.outputs.backend }}
      migrations_changed: ${{ steps.changes.outputs.migrations }}
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Get changed files
        id: changes
        run: |
          # For workflow_run, compare the head commit with its parent
          if [ "${{ github.event_name }}" == "workflow_run" ]; then
            BASE_SHA="${{ github.event.workflow_run.head_commit.id }}~1"
            HEAD_SHA="${{ github.event.workflow_run.head_commit.id }}"
          else
            # For manual trigger, always deploy
            echo "backend=true" >> $GITHUB_OUTPUT
            echo "migrations=true" >> $GITHUB_OUTPUT
            exit 0
          fi

          # Check for backend changes (including test projects)
          if git diff --name-only $BASE_SHA $HEAD_SHA | grep -qE '^src/Cadence\.(Core|WebApi)(\.Tests)?/'; then
            echo "backend=true" >> $GITHUB_OUTPUT
            echo "Backend changes detected"
          else
            echo "backend=false" >> $GITHUB_OUTPUT
            echo "No backend changes detected"
          fi

          # Check specifically for migration changes
          if git diff --name-only $BASE_SHA $HEAD_SHA | grep -qE '^src/Cadence\.Core/Migrations/'; then
            echo "migrations=true" >> $GITHUB_OUTPUT
            echo "Migration changes detected"
          else
            echo "migrations=false" >> $GITHUB_OUTPUT
            echo "No migration changes detected"
          fi

  build:
    name: Build Backend
    runs-on: ubuntu-latest
    needs: check-changes
    if: needs.check-changes.outputs.backend_changed == 'true'

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: ${{ env.DOTNET_VERSION }}

      - name: Restore WebApi dependencies
        run: dotnet restore ${{ env.WEBAPI_PROJECT_PATH }}/Cadence.WebApi.csproj

      - name: Build WebApi
        run: dotnet build ${{ env.WEBAPI_PROJECT_PATH }}/Cadence.WebApi.csproj --configuration Release --no-restore

      - name: Run Core tests
        run: dotnet test src/Cadence.Core.Tests/Cadence.Core.Tests.csproj --configuration Release --verbosity normal

      - name: Run WebApi tests
        run: dotnet test src/Cadence.WebApi.Tests/Cadence.WebApi.Tests.csproj --configuration Release --verbosity normal

      - name: Publish WebApi
        run: dotnet publish ${{ env.WEBAPI_PROJECT_PATH }}/Cadence.WebApi.csproj --configuration Release --output ./publish/webapi

      - name: Upload WebApi artifact
        uses: actions/upload-artifact@v4
        with:
          name: web-api
          path: ./publish/webapi
          retention-days: 1

  deploy:
    name: Deploy Backend
    runs-on: ubuntu-latest
    needs: [check-changes, build]
    environment:
      name: ${{ github.event.inputs.environment || 'production' }}
      url: ${{ steps.deploy-webapi.outputs.webapp-url }}

    steps:
      - name: Checkout code (for migrations)
        if: needs.check-changes.outputs.migrations_changed == 'true'
        uses: actions/checkout@v4

      - name: Setup .NET (for migrations)
        if: needs.check-changes.outputs.migrations_changed == 'true'
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: ${{ env.DOTNET_VERSION }}

      - name: Install EF Core tools
        if: needs.check-changes.outputs.migrations_changed == 'true'
        run: |
          dotnet tool install --global dotnet-ef || dotnet tool update --global dotnet-ef
          echo "$HOME/.dotnet/tools" >> $GITHUB_PATH

      - name: Restore dependencies (for migrations)
        if: needs.check-changes.outputs.migrations_changed == 'true'
        run: dotnet restore src/Cadence.WebApi/Cadence.WebApi.csproj

      - name: Apply EF Core migrations
        if: needs.check-changes.outputs.migrations_changed == 'true'
        run: |
          echo "Applying EF Core migrations to database..."
          ~/.dotnet/tools/dotnet-ef database update \
            --project src/Cadence.Core/Cadence.Core.csproj \
            --startup-project src/Cadence.WebApi/Cadence.WebApi.csproj \
            --connection "${{ secrets.AZURE_SQL_CONNECTION_STRING }}" \
            --verbose
        env:
          DOTNET_ENVIRONMENT: Production

      - name: Download WebApi artifact
        uses: actions/download-artifact@v4
        with:
          name: web-api
          path: ./web-api

      - name: Deploy to Azure Web App
        id: deploy-webapi
        uses: azure/webapps-deploy@v3
        with:
          app-name: ${{ env.AZURE_WEBAPP_NAME }}
          package: ./web-api
          publish-profile: ${{ secrets.AZURE_WEBAPP_PUBLISH_PROFILE }}

      - name: Health check (WebApi)
        run: |
          WEBAPP_URL="${{ steps.deploy-webapi.outputs.webapp-url }}"
          echo "Checking health at: ${WEBAPP_URL}/api/health"
          echo "Waiting 60 seconds for app to warm up..."
          sleep 60

          # Retry up to 5 times with 15 second intervals
          for i in 1 2 3 4 5; do
            echo "Health check attempt $i..."
            response=$(curl -s -o /dev/null -w "%{http_code}" --max-time 30 "${WEBAPP_URL}/api/health" || echo "000")
            if [ "$response" = "200" ]; then
              echo "WebApi health check passed!"
              exit 0
            fi
            echo "Got status $response, waiting 15 seconds before retry..."
            sleep 15
          done

          echo "WebApi health check failed after 5 attempts"
          exit 1

  skip-deploy:
    name: Skip Backend Deploy (No Changes)
    runs-on: ubuntu-latest
    needs: check-changes
    if: needs.check-changes.outputs.backend_changed == 'false'
    steps:
      - name: Log skip reason
        run: |
          echo "Skipping backend deployment - no backend file changes detected"
          echo "To force a deployment, use workflow_dispatch manually"
