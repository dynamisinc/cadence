name: Deploy Backend

on:
  push:
    branches: [main]
    paths:
      - "src/Dynamis.Functions/**"
      - "src/Dynamis.WebApi/**"
      - "src/Dynamis.Core/**"
      - "src/Dynamis.Tests/**"
      - ".github/workflows/deploy-backend.yml"
  workflow_dispatch:
    inputs:
      environment:
        description: "Environment to deploy to"
        required: true
        default: "production"
        type: choice
        options:
          - production
          - staging
      hosting_model:
        description: "Hosting Model"
        required: true
        default: "webapi"
        type: choice
        options:
          - functions
          - webapi
          - both

env:
  DOTNET_VERSION: "10.0.x"
  AZURE_FUNCTIONAPP_NAME: "func-refapp-dev"
  AZURE_WEBAPP_NAME: "web-refapp-dev"
  FUNCTIONS_PROJECT_PATH: "src/Dynamis.Functions"
  WEBAPI_PROJECT_PATH: "src/Dynamis.WebApi"
  HOSTING_MODEL: ${{ github.event.inputs.hosting_model || 'webapi' }}

concurrency:
  group: deploy-backend-${{ github.ref }}
  cancel-in-progress: false

jobs:
  build:
    name: Build Backend
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: ${{ env.DOTNET_VERSION }}

      - name: Restore Functions dependencies
        if: env.HOSTING_MODEL == 'functions' || env.HOSTING_MODEL == 'both'
        run: dotnet restore ${{ env.FUNCTIONS_PROJECT_PATH }}/Dynamis.Functions.csproj

      - name: Restore WebApi dependencies
        if: env.HOSTING_MODEL == 'webapi' || env.HOSTING_MODEL == 'both'
        run: dotnet restore ${{ env.WEBAPI_PROJECT_PATH }}/Dynamis.WebApi.csproj

      - name: Build Functions
        if: env.HOSTING_MODEL == 'functions' || env.HOSTING_MODEL == 'both'
        run: dotnet build ${{ env.FUNCTIONS_PROJECT_PATH }}/Dynamis.Functions.csproj --configuration Release --no-restore

      - name: Build WebApi
        if: env.HOSTING_MODEL == 'webapi' || env.HOSTING_MODEL == 'both'
        run: dotnet build ${{ env.WEBAPI_PROJECT_PATH }}/Dynamis.WebApi.csproj --configuration Release --no-restore

      - name: Run Core tests
        run: dotnet test src/Dynamis.Core.Tests/Dynamis.Core.Tests.csproj --configuration Release --verbosity normal

      - name: Run Functions tests
        if: env.HOSTING_MODEL == 'functions' || env.HOSTING_MODEL == 'both'
        run: dotnet test src/Dynamis.Functions.Tests/Dynamis.Functions.Tests.csproj --configuration Release --verbosity normal

      - name: Run WebApi tests
        if: env.HOSTING_MODEL == 'webapi' || env.HOSTING_MODEL == 'both'
        run: dotnet test src/Dynamis.WebApi.Tests/Dynamis.WebApi.Tests.csproj --configuration Release --verbosity normal

      - name: Publish Functions
        if: env.HOSTING_MODEL == 'functions' || env.HOSTING_MODEL == 'both'
        run: dotnet publish ${{ env.FUNCTIONS_PROJECT_PATH }}/Dynamis.Functions.csproj --configuration Release --output ./publish/functions

      - name: Publish WebApi
        if: env.HOSTING_MODEL == 'webapi' || env.HOSTING_MODEL == 'both'
        run: dotnet publish ${{ env.WEBAPI_PROJECT_PATH }}/Dynamis.WebApi.csproj --configuration Release --output ./publish/webapi

      - name: Upload Functions artifact
        if: env.HOSTING_MODEL == 'functions' || env.HOSTING_MODEL == 'both'
        uses: actions/upload-artifact@v4
        with:
          name: functions-app
          path: ./publish/functions
          retention-days: 1

      - name: Upload WebApi artifact
        if: env.HOSTING_MODEL == 'webapi' || env.HOSTING_MODEL == 'both'
        uses: actions/upload-artifact@v4
        with:
          name: web-api
          path: ./publish/webapi
          retention-days: 1

  deploy:
    name: Deploy Backend
    runs-on: ubuntu-latest
    needs: build
    environment:
      name: ${{ github.event.inputs.environment || 'production' }}
      url: ${{ steps.deploy-webapi.outputs.webapp-url }}

    steps:
      - name: Download Functions artifact
        if: env.HOSTING_MODEL == 'functions' || env.HOSTING_MODEL == 'both'
        uses: actions/download-artifact@v4
        with:
          name: functions-app
          path: ./functions-app

      - name: Download WebApi artifact
        if: env.HOSTING_MODEL == 'webapi' || env.HOSTING_MODEL == 'both'
        uses: actions/download-artifact@v4
        with:
          name: web-api
          path: ./web-api

      - name: Deploy to Azure Functions
        if: env.HOSTING_MODEL == 'functions' || env.HOSTING_MODEL == 'both'
        id: deploy-functions
        uses: Azure/functions-action@v1
        with:
          app-name: ${{ env.AZURE_FUNCTIONAPP_NAME }}
          package: ./functions-app
          publish-profile: ${{ secrets.AZURE_FUNCTIONAPP_PUBLISH_PROFILE }}

      - name: Deploy to Azure Web App
        if: env.HOSTING_MODEL == 'webapi' || env.HOSTING_MODEL == 'both'
        id: deploy-webapi
        uses: azure/webapps-deploy@v3
        with:
          app-name: ${{ env.AZURE_WEBAPP_NAME }}
          package: ./web-api
          publish-profile: ${{ secrets.AZURE_WEBAPP_PUBLISH_PROFILE }}

      - name: Health check (Functions)
        if: env.HOSTING_MODEL == 'functions' || env.HOSTING_MODEL == 'both'
        run: |
          sleep 30
          response=$(curl -s -o /dev/null -w "%{http_code}" "https://${{ env.AZURE_FUNCTIONAPP_NAME }}.azurewebsites.net/api/health" || echo "000")
          if [ "$response" != "200" ]; then
            echo "Functions health check failed with status: $response"
            # Don't fail yet, check WebApi too
          else
            echo "Functions health check passed!"
          fi

      - name: Health check (WebApi)
        if: env.HOSTING_MODEL == 'webapi' || env.HOSTING_MODEL == 'both'
        run: |
          response=$(curl -s -o /dev/null -w "%{http_code}" "https://${{ env.AZURE_WEBAPP_NAME }}.azurewebsites.net/health" || echo "000")
          if [ "$response" != "200" ]; then
            echo "WebApi health check failed with status: $response"
            exit 1
          fi
          echo "WebApi health check passed!"
