name: CI

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]
    paths-ignore:
      - "**.md"
      - "docs/**"

env:
  DOTNET_VERSION: "10.0.x"
  NODE_VERSION: "20"

jobs:
  build-backend:
    name: Build & Test Backend
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: ${{ env.DOTNET_VERSION }}

      - name: Cache NuGet packages
        uses: actions/cache@v4
        with:
          path: ~/.nuget/packages
          key: ${{ runner.os }}-nuget-${{ hashFiles('**/packages.lock.json', '**/*.csproj') }}
          restore-keys: |
            ${{ runner.os }}-nuget-

      - name: Restore dependencies
        run: dotnet restore src/Cadence.WebApi/Cadence.WebApi.csproj

      - name: Build
        run: dotnet build src/Cadence.WebApi/Cadence.WebApi.csproj --no-restore --configuration Release

      - name: Run Core tests
        run: dotnet test src/Cadence.Core.Tests/Cadence.Core.Tests.csproj --configuration Release --verbosity normal --logger "trx;LogFileName=core-test-results.trx"

      - name: Run WebApi tests
        run: dotnet test src/Cadence.WebApi.Tests/Cadence.WebApi.Tests.csproj --configuration Release --verbosity normal --logger "trx;LogFileName=webapi-test-results.trx"

      - name: Upload test results
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: backend-test-results
          path: |
            src/Cadence.Core.Tests/TestResults/*.trx
            src/Cadence.WebApi.Tests/TestResults/*.trx

  build-frontend:
    name: Build & Test Frontend
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: "npm"
          cache-dependency-path: src/frontend/package-lock.json

      - name: Install dependencies
        run: npm ci
        working-directory: src/frontend

      - name: Lint
        run: npm run lint
        working-directory: src/frontend

      - name: Type check
        run: npm run type-check
        working-directory: src/frontend
        continue-on-error: true

      - name: Run tests
        run: npm run test:run -- --reporter=verbose
        working-directory: src/frontend

      - name: Build
        run: npm run build
        working-directory: src/frontend
        env:
          VITE_API_URL: ""

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: frontend-dist
          path: src/frontend/dist
          retention-days: 7

  security-scan:
    name: Security Scan
    runs-on: ubuntu-latest
    needs: [build-backend]

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Run dotnet security scan
        run: |
          dotnet list src/Cadence.WebApi/Cadence.WebApi.csproj package --vulnerable --include-transitive
        continue-on-error: true

  all-checks-passed:
    name: All Checks Passed
    runs-on: ubuntu-latest
    needs: [build-backend, build-frontend]
    if: always()

    steps:
      - name: Check results
        run: |
          if [ "${{ needs.build-backend.result }}" != "success" ]; then
            echo "Backend checks failed"
            exit 1
          fi
          if [ "${{ needs.build-frontend.result }}" != "success" ]; then
            echo "Frontend checks failed"
            exit 1
          fi
          echo "All checks passed!"
