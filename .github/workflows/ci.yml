name: CI

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]
    paths-ignore:
      - "**.md"
      - "docs/**"

env:
  DOTNET_VERSION: "10.0.x"
  NODE_VERSION: "20"

jobs:
  build-backend:
    name: Build & Test Backend
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v5
        with:
          dotnet-version: ${{ env.DOTNET_VERSION }}

      - name: Cache NuGet packages
        uses: actions/cache@v5
        with:
          path: ~/.nuget/packages
          key: ${{ runner.os }}-nuget-${{ hashFiles('**/packages.lock.json', '**/*.csproj') }}
          restore-keys: |
            ${{ runner.os }}-nuget-

      - name: Restore dependencies
        run: |
          dotnet restore src/Cadence.WebApi/Cadence.WebApi.csproj
          dotnet restore src/Cadence.Core.Tests/Cadence.Core.Tests.csproj
          dotnet restore src/Cadence.WebApi.Tests/Cadence.WebApi.Tests.csproj

      - name: Build
        run: dotnet build src/Cadence.WebApi/Cadence.WebApi.csproj --no-restore --configuration Release

      - name: Run Core tests
        run: dotnet test src/Cadence.Core.Tests/Cadence.Core.Tests.csproj --no-restore --configuration Release --verbosity normal --logger "trx;LogFileName=core-test-results.trx"

      - name: Run WebApi tests
        run: dotnet test src/Cadence.WebApi.Tests/Cadence.WebApi.Tests.csproj --no-restore --configuration Release --verbosity normal --logger "trx;LogFileName=webapi-test-results.trx"

      - name: Upload test results
        uses: actions/upload-artifact@v7
        if: always()
        with:
          name: backend-test-results
          path: |
            src/Cadence.Core.Tests/TestResults/*.trx
            src/Cadence.WebApi.Tests/TestResults/*.trx

  build-frontend:
    name: Build & Test Frontend
    runs-on: ubuntu-latest
    permissions:
      contents: read
      checks: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: "npm"
          cache-dependency-path: src/frontend/package-lock.json

      - name: Install dependencies
        run: npm ci
        working-directory: src/frontend

      - name: Lint
        run: npm run lint
        working-directory: src/frontend

      - name: Type check
        run: npm run type-check
        working-directory: src/frontend
        continue-on-error: true

      # =========================================================================
      # Frontend Tests - Improved reporting & faster feedback
      # - Bails after 10 failures (faster than running all 2300+ tests)
      # - GitHub Actions annotations for failed tests
      # - Clickable test summary in Actions UI
      # =========================================================================
      - name: Create test results directory
        run: mkdir -p test-results
        working-directory: src/frontend

      - name: Run tests
        id: frontend-tests
        run: npm run test:ci
        working-directory: src/frontend
        continue-on-error: true
        env:
          CI: true

      # Publish clickable test summary in GitHub Actions UI
      # Note: vitest produces standard JUnit XML, not Jest's variant, so use java-junit
      # continue-on-error: Dependabot PRs have read-only tokens and can't create check runs
      - name: Publish Test Summary
        uses: dorny/test-reporter@v2
        if: always() && (steps.frontend-tests.outcome == 'success' || steps.frontend-tests.outcome == 'failure')
        continue-on-error: true
        with:
          name: Frontend Test Results
          path: src/frontend/test-results/junit.xml
          reporter: java-junit
          fail-on-error: false

      # Upload detailed results as downloadable artifact
      - name: Upload test results
        uses: actions/upload-artifact@v7
        if: always()
        with:
          name: frontend-test-results
          path: src/frontend/test-results/
          retention-days: 7

      # Fail the job if tests failed (after uploading results)
      - name: Check test results
        if: steps.frontend-tests.outcome == 'failure'
        run: |
          echo "::error::Frontend tests failed. Check the 'Frontend Test Results' summary above for details."
          exit 1

      - name: Build
        run: npm run build
        working-directory: src/frontend
        env:
          VITE_API_URL: ""

      - name: Upload build artifact
        uses: actions/upload-artifact@v7
        with:
          name: frontend-dist
          path: src/frontend/dist
          retention-days: 7

  security-scan:
    name: Security Scan
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v5
        with:
          dotnet-version: ${{ env.DOTNET_VERSION }}

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: "npm"
          cache-dependency-path: src/frontend/package-lock.json

      # NuGet vulnerability scan - all projects
      - name: Scan NuGet packages for vulnerabilities
        run: |
          echo "## NuGet Vulnerability Scan" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY

          FOUND_VULN=false

          for PROJECT in src/Cadence.Core/Cadence.Core.csproj src/Cadence.WebApi/Cadence.WebApi.csproj src/Cadence.Functions/Cadence.Functions.csproj; do
            echo "### Scanning $(basename $(dirname $PROJECT))" >> $GITHUB_STEP_SUMMARY
            OUTPUT=$(dotnet list $PROJECT package --vulnerable --include-transitive 2>&1)
            echo "$OUTPUT"

            if echo "$OUTPUT" | grep -qiE "(High|Critical)"; then
              FOUND_VULN=true
              echo "::error::High or Critical NuGet vulnerability found in $PROJECT"
              echo "**HIGH/CRITICAL vulnerabilities found**" >> $GITHUB_STEP_SUMMARY
            else
              echo "No high/critical vulnerabilities" >> $GITHUB_STEP_SUMMARY
            fi
            echo "" >> $GITHUB_STEP_SUMMARY
          done

          if [ "$FOUND_VULN" = true ]; then
            echo "::error::High or Critical NuGet vulnerabilities detected. Update affected packages."
            exit 1
          fi

      # npm vulnerability scan - frontend
      - name: Install frontend dependencies
        run: npm ci
        working-directory: src/frontend

      - name: Scan npm packages for vulnerabilities
        run: |
          echo "## npm Vulnerability Scan" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY

          if npm audit --audit-level=high --omit=dev 2>&1 | tee /tmp/npm-audit.txt; then
            echo "No high/critical npm vulnerabilities" >> $GITHUB_STEP_SUMMARY
          else
            echo "**HIGH/CRITICAL npm vulnerabilities found** — see output above" >> $GITHUB_STEP_SUMMARY
            echo "::error::High or Critical npm vulnerabilities detected. Run 'npm audit' locally for details."
            exit 1
          fi

  all-checks-passed:
    name: All Checks Passed
    runs-on: ubuntu-latest
    needs: [build-backend, build-frontend, security-scan]
    if: always()

    steps:
      - name: Check results
        run: |
          if [ "${{ needs.build-backend.result }}" != "success" ]; then
            echo "Backend checks failed"
            exit 1
          fi
          if [ "${{ needs.build-frontend.result }}" != "success" ]; then
            echo "Frontend checks failed"
            exit 1
          fi
          if [ "${{ needs.security-scan.result }}" != "success" ]; then
            echo "Security scan failed"
            exit 1
          fi
          echo "All checks passed!"
