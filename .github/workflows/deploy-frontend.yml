name: Deploy Frontend

on:
  workflow_run:
    workflows: ["CI"]
    types: [completed]
    branches: [main]
  workflow_dispatch:
    inputs:
      environment:
        description: "Environment to deploy to"
        required: true
        default: "uat"
        type: choice
        options:
          - uat
          - production

env:
  NODE_VERSION: "20"

concurrency:
  group: deploy-frontend-${{ github.ref }}
  cancel-in-progress: false

jobs:
  check-changes:
    name: Check for Frontend Changes
    runs-on: ubuntu-latest
    if: ${{ github.event_name == 'workflow_dispatch' || github.event.workflow_run.conclusion == 'success' }}
    outputs:
      frontend_changed: ${{ steps.changes.outputs.frontend }}
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Get changed files
        id: changes
        run: |
          if [ "${{ github.event_name }}" == "workflow_run" ]; then
            BASE_SHA="${{ github.event.workflow_run.head_commit.id }}~1"
            HEAD_SHA="${{ github.event.workflow_run.head_commit.id }}"
          else
            echo "frontend=true" >> $GITHUB_OUTPUT
            exit 0
          fi

          # Check for frontend changes
          # Note: We DO deploy on release-please PRs because:
          # - CHANGELOG.md is bundled for the About page release notes
          # - package.json version is shown in the app
          if git diff --name-only $BASE_SHA $HEAD_SHA | grep -qE '^src/frontend/'; then
            echo "frontend=true" >> $GITHUB_OUTPUT
            echo "Changed files in src/frontend/:"
            git diff --name-only $BASE_SHA $HEAD_SHA | grep -E '^src/frontend/' | head -20
          else
            echo "frontend=false" >> $GITHUB_OUTPUT
          fi

  build:
    name: Build Frontend
    runs-on: ubuntu-latest
    needs: check-changes
    if: needs.check-changes.outputs.frontend_changed == 'true'
    environment:
      name: ${{ github.event.inputs.environment || 'uat' }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: "npm"
          cache-dependency-path: src/frontend/package-lock.json

      - name: Install dependencies
        run: npm ci
        working-directory: src/frontend

      - name: Run tests
        run: npm run test:run
        working-directory: src/frontend

      - name: Build
        run: npm run build
        working-directory: src/frontend
        env:
          VITE_API_URL: ${{ vars.VITE_API_URL || '' }}
          VITE_SIGNALR_URL: ${{ vars.VITE_SIGNALR_URL || '' }}
          # PWA: 'autoUpdate' for UAT (silent updates), 'prompt' for production (user approval)
          VITE_PWA_REGISTER_TYPE: ${{ vars.VITE_PWA_REGISTER_TYPE || 'autoUpdate' }}

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: frontend
          path: src/frontend/dist
          retention-days: 1

  deploy:
    name: Deploy Frontend
    runs-on: ubuntu-latest
    needs: [check-changes, build]
    environment:
      name: ${{ github.event.inputs.environment || 'uat' }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Download artifact
        uses: actions/download-artifact@v4
        with:
          name: frontend
          path: src/frontend/dist

      - name: Deploy to Azure Static Web Apps
        uses: Azure/static-web-apps-deploy@v1
        with:
          azure_static_web_apps_api_token: ${{ secrets.AZURE_STATIC_WEB_APPS_API_TOKEN }}
          repo_token: ${{ secrets.GITHUB_TOKEN }}
          action: "upload"
          skip_app_build: true
          skip_api_build: true
          app_location: "src/frontend/dist"

  skip-deploy:
    name: Skip Frontend Deploy (No Changes)
    runs-on: ubuntu-latest
    needs: check-changes
    if: needs.check-changes.outputs.frontend_changed == 'false'
    steps:
      - name: Log skip reason
        run: |
          echo "Skipping frontend deployment - no frontend changes detected"
          echo "To force deployment, use workflow_dispatch manually"
