<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Cadence - Offline</title>
  <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
  <meta name="theme-color" content="#1e3a5f" />
  <style>
    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }
    body {
      font-family: Roboto, -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      padding: 24px;
      background: #f8f8f8;
      color: #333;
    }
    .container {
      text-align: center;
      max-width: 400px;
    }
    .icon {
      width: 80px;
      height: 80px;
      margin-bottom: 24px;
      fill: #1e3a5f;
    }
    h1 {
      color: #1e3a5f;
      font-size: 28px;
      font-weight: 500;
      margin-bottom: 12px;
    }
    p {
      color: #666;
      font-size: 16px;
      line-height: 1.5;
      margin-bottom: 8px;
    }
    .hint {
      color: #888;
      font-size: 14px;
      margin-top: 16px;
    }
    button {
      margin-top: 24px;
      padding: 12px 32px;
      background: #1e3a5f;
      color: white;
      border: none;
      border-radius: 50px;
      font-size: 16px;
      font-family: inherit;
      cursor: pointer;
      transition: background 0.2s;
    }
    button:hover {
      background: #0000ff;
    }
    button:active {
      background: #00008b;
    }
  </style>
</head>
<body>
  <div class="container">
    <svg class="icon" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24">
      <!-- Cloud offline icon -->
      <path d="M19.35 10.04A7.49 7.49 0 0 0 12 4C9.11 4 6.6 5.64 5.35 8.04A5.994 5.994 0 0 0 0 14c0 3.31 2.69 6 6 6h13c2.76 0 5-2.24 5-5 0-2.64-2.05-4.78-4.65-4.96zM19 18H6c-2.21 0-4-1.79-4-4s1.79-4 4-4h.71C7.37 7.69 9.48 6 12 6c3.04 0 5.5 2.46 5.5 5.5v.5H19c1.66 0 3 1.34 3 3s-1.34 3-3 3z"/>
      <path d="M3.41 2.59 2 4l3.69 3.69A5.96 5.96 0 0 0 0 14c0 3.31 2.69 6 6 6h11.17l2.83 2.83 1.41-1.41L3.41 2.59zM6 18c-2.21 0-4-1.79-4-4 0-1.95 1.4-3.57 3.24-3.92L15.17 20H6z"/>
    </svg>
    <h1>You're Offline</h1>
    <p>Cadence requires an initial connection to load the application.</p>
    <p>Please check your network connection and try again.</p>
    <p class="hint">Once loaded, Cadence will work offline for your exercises.</p>
    <button onclick="location.reload()">Try Again</button>
  </div>
</body>
</html>
